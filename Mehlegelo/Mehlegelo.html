<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Őshonos Vadvirágok Katalógusa</title>
<meta name="description" content="39 őshonos vadvirág interaktív katalógusa – képekkel, részletes leírásokkal, háromnyelvű tartalommal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:#f0f4f0;--bg2:#fff;--sb:#1a2e1a;--sbt:#e8f5e9;--tp:#1a2e1a;--ts:#5c7a5c;
  --ac:#4a7c59;--ach:#2e5e3a;--bd:#d4e6d4;--sh:0 4px 20px rgba(0,0,0,.08);
  --tr:all .3s cubic-bezier(.4,0,.2,1);--sbw:300px;
}
body.dark{
  --bg:#0d1a0d;--bg2:#1a2e1a;--sb:#0d1a0d;--sbt:#c8e6c9;--tp:#e8f5e9;--ts:#81a881;
  --ac:#66bb6a;--ach:#4caf50;--bd:#2e4a2e;--sh:0 4px 20px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--tp);transition:var(--tr);overflow-x:hidden;display:flex;min-height:100vh}

/* SIDEBAR */
#sb{width:var(--sbw);background:var(--sb);color:var(--sbt);height:100vh;position:fixed;top:0;left:0;z-index:1000;display:flex;flex-direction:column;transition:var(--tr);box-shadow:4px 0 20px rgba(0,0,0,.2)}
#sb.hidden{transform:translateX(-100%)}
.sb-head{padding:1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center}
.sb-head h2{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--ac);display:flex;align-items:center;gap:.5rem}
.sb-filters{padding:0 .75rem .75rem; display:flex; flex-direction:column; gap:.5rem; border-bottom:1px solid rgba(255,255,255,.1)}
.sb-filters select{width:100%; padding:.5rem; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:.4rem; color:#fff; font-size:.8rem; outline:none; cursor:pointer;}
.sb-filters select option{background:var(--sb); color:#fff;}
.sb-search{padding:.75rem;position:relative}
.sb-search input{width:100%;padding:.6rem .75rem .6rem 2.2rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:.5rem;color:#fff;outline:none;font-size:.85rem;transition:var(--tr)}
.sb-search input::placeholder{color:rgba(255,255,255,.4)}
.sb-search input:focus{border-color:var(--ac);background:rgba(255,255,255,.13)}
.sb-search i{position:absolute;left:1.35rem;top:1.2rem;color:rgba(255,255,255,.4);font-size:.8rem}
.sb-nav{flex:1;overflow-y:auto;padding:.4rem .6rem}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--ac);border-radius:2px}
.sb-nav a{display:flex;align-items:center;gap:.5rem;padding:.55rem .75rem;color:rgba(255,255,255,.65);text-decoration:none;border-radius:.4rem;font-size:.82rem;transition:var(--tr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-nav a:hover,.sb-nav a.active{background:var(--ac);color:#fff}
.sb-nav a i{font-size:.65rem;flex-shrink:0}
.sb-count{padding:.5rem 1rem .75rem;font-size:.75rem;color:rgba(255,255,255,.35);text-align:center}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;backdrop-filter:blur(3px)}
#overlay.on{display:block}

/* MAIN */
#main{flex:1;margin-left:var(--sbw);transition:var(--tr);padding:1.5rem;min-width:0}
#main.expanded{margin-left:0}

/* HEADER */
header{position:sticky;top:.5rem;z-index:100;display:flex;justify-content:space-between;align-items:center;background:var(--bg2);padding:.9rem 1.25rem;border-radius:.75rem;box-shadow:var(--sh);border:1px solid var(--bd);margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;transition:var(--tr)}
.hdr-left{display:flex;align-items:center;gap:.9rem}
.hdr-title h1{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--tp);line-height:1.2}
.hdr-title span{font-size:.78rem;color:var(--ts)}
.hdr-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.btn-icon{background:transparent;border:1px solid var(--bd);color:var(--tp);width:38px;height:38px;border-radius:.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);font-size:.9rem}
.btn-icon:hover{border-color:var(--ac);color:var(--ac);background:var(--bg)}
.lang-switcher{display:flex;border:1px solid var(--bd);border-radius:.5rem;overflow:hidden}
.lang-btn{background:transparent;border:none;color:var(--ts);padding:.3rem .55rem;cursor:pointer;font-size:.75rem;font-weight:600;transition:var(--tr)}
.lang-btn:hover{background:var(--bg);color:var(--ac)}
.lang-btn.active{background:var(--ac);color:#fff}
.lang-btn+.lang-btn{border-left:1px solid var(--bd)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem}
.no-results{text-align:center;color:var(--ts);padding:3rem;font-size:1.1rem;grid-column:1/-1}

/* CARD */
.card{background:var(--bg2);border-radius:1rem;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--bd);transition:var(--tr);display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.12)}

/* CAROUSEL */
.carousel{position:relative;height:230px;overflow:hidden;background:#1a1a1a;cursor:zoom-in}
.c-track{display:flex;height:100%;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.c-slide{min-width:100%;height:100%}
.c-slide img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.c-slide img:hover{transform:scale(1.02)}
.c-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);color:#fff;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:var(--tr);z-index:10;font-size:.8rem}
.c-btn:hover{background:var(--ac)}
.c-btn.prev{left:8px}.c-btn.next{right:8px}
.c-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:.4rem;z-index:10}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;transition:var(--tr)}
.dot.on{background:var(--ac);transform:scale(1.3)}

/* CARD BODY */
.c-body{padding:1.25rem;display:flex;flex-direction:column;flex:1;gap:.75rem}
.c-names h3{font-size:1.05rem;font-weight:700;color:var(--tp);margin-bottom:.2rem}
.c-names .sci{font-size:.78rem;font-style:italic;color:var(--ts)}
.badges{display:flex;flex-wrap:wrap;gap:.35rem}
.badge{display:flex;align-items:center;gap:.3rem;background:var(--bg);border:1px solid var(--bd);border-radius:.4rem;padding:.25rem .5rem;font-size:.72rem;color:var(--ts)}
.badge i{color:var(--ac);font-size:.7rem}
.c-desc{font-size:.85rem;line-height:1.6;color:var(--ts);flex:1}
.c-link{display:flex;align-items:center;justify-content:center;gap:.5rem;background:var(--ac);color:#fff;padding:.6rem;border-radius:.5rem;text-decoration:none;font-size:.83rem;font-weight:600;transition:var(--tr);margin-top:auto}
.c-link:hover{background:var(--ach)}

/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:zoom-out}
#lb.on{display:flex}
#lb img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:.5rem;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:lbIn .25s ease}
#lb-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
#lb-close:hover{background:rgba(255,255,255,.3)}
@keyframes lbIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

/* RESPONSIVE */
@media(max-width:1024px){
  #main{margin-left:0}
  #sb{transform:translateX(-100%)}
  #sb.mob-on{transform:translateX(0)}
}
@media(max-width:640px){
  .grid{grid-template-columns:1fr}
  header{flex-direction:column;align-items:flex-start}
  .hdr-right{width:100%;justify-content:flex-end}
}
</style>
</head>
<body>

<div id="overlay"></div>

<aside id="sb">
  <div class="sb-head">
    <h2><i class="fa-solid fa-seedling"></i> <span data-ui="menuTitle">Vadvirágok</span></h2>
    <button class="btn-icon" id="sb-close" style="border:none;color:rgba(255,255,255,.6);width:30px;height:30px"><i class="fa-solid fa-times"></i></button>

  <nav class="sb-nav" id="sb-nav"></nav>

</aside>

<div id="main">

    <div class="hdr-left">
      <button class="btn-icon" id="sb-toggle" title="Menü"><i class="fa-solid fa-bars"></i></button>
      <div class="hdr-title">
        <h1 data-ui="title">Őshonos Vadvirág Keverék</h1>
        <span data-ui="subtitle">Interaktív katalógus</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="hu">HU</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="btn-icon" id="dark-btn" title="Téma"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>
  <section class="grid" id="grid"></section>
</div>

<div id="lb">
  <button id="lb-close"><i class="fa-solid fa-times"></i></button>
  <img id="lb-img" src="" alt="">
</div>

       de:"Die Ringelblume (Calendula officinalis) ist eine leicht erkennbare einjährige Heilpflanze mit orangen oder gelben Blütenköpfen. Ihre entzündungshemmende und wundheilende Wirkung wird in Kosmetika und Heilsalben bis heute genutzt.",
       en:"Pot Marigold (Calendula officinalis) is easily recognised by its orange or yellow flower heads. Its anti-inflammatory and wound-healing properties are still widely used in cosmetics and medicinal ointments."},

       de:"Die Ausgebreitete Glockenblume (Campanula patula) trägt lila Glockenblüten auf langen, sparrig ausgebreiteten Stielen. Zweijährige Wiesenpflanze frischer Mähwiesen und Waldränder; gerne von Insekten besucht.",

       de:"Die Kornblume (Centaurea cyanus) mit ihrer strahlend azurblauen Blüte ist eine der bekanntesten Feldblumen. Einjährig; einst Ackerunkraut, heute unverzichtbarer Schmuck der Wildblumenwiesen; bei Schmetterlingen und Bienen sehr beliebt.",

       de:"Die Karthäuser-Nelke (Dianthus carthusianorum) zeigt tiefpurpurrote Blüten in dichten Köpfchen. Bewohner trockener, kalkreicher Magerrasen; ihr würziger Duft stammt von für Nelken typischen Aromastoffen.",

       de:"Die Großblütige Braunelle (Prunella grandiflora) formt große Köpfchen aus dichten violetten Lippenblüten. Bildet niedrige Teppiche auf Kalktrockenrasen; ein äußerst dekorativer einheimischer Bodendecker.",

       de:"Die Kleine Braunelle (Prunella vulgaris) kommt mit kleineren blau-violetten Blütenständen überall auf Wiesen und Wegen vor. Sehr trittfest und schnittverträglich; Nektarquelle für Hummeln.",

       de:"Der Wiesen-Salbei (Salvia pratensis) ziert frühsommerliche Wiesen mit tiefblauen, teils violetten Blütenständen. Auf trockenen Lössböden zuhause; sein spezieller Hebelmechanismus garantiert die Bestäubung durch Bienen.",

// ── STATE ────────────────────────────────────────────────────────────────────
let lang = localStorage.getItem('lang') || 'hu';
let slides = {};
let renderLimit = 10;
const $ = id => document.getElementById(id);

// ── DARK MODE ────────────────────────────────────────────────────────────────
function applyTheme(dark){
  document.body.classList.toggle('dark', dark);
  $('dark-btn').innerHTML = dark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
}
let isDark = localStorage.getItem('theme') === 'dark';
applyTheme(isDark);
$('dark-btn').addEventListener('click', () => {
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme(isDark);
});

// ── LANGUAGE ─────────────────────────────────────────────────────────────────
function applyLang(l){
  lang = l;
  localStorage.setItem('lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.querySelectorAll('[data-ui]').forEach(el => { const k=el.dataset.ui; if(UI[l][k]) el.textContent = UI[l][k]; });
  document.querySelectorAll('[data-ui-ph]').forEach(el => { const k=el.dataset.uiPh; if(UI[l][k]) el.placeholder = UI[l][k]; });
  
  // Re-populate select filters
  function popF(id, field, allTxt){
    const sel = $(id); const val = sel.value;
    sel.innerHTML = `<option value="">${allTxt}</option>` + getUnique(field).map(v => `<option value="${v}">${v}</option>`).join('');
    sel.value = [...sel.options].some(o=>o.value===val) ? val : '';
  }
  popF('fl-life', 'lifespan', UI[l].filterLife);
  popF('fl-soil', 'soil', UI[l].filterSoil);
  popF('fl-drought', 'drought', UI[l].filterDrought);
  popF('fl-sun', 'sun', UI[l].filterSun);
  
  renderAll();
}
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
const sb = $('sb'), main = $('main'), overlay = $('overlay');
function isMob(){ return window.innerWidth <= 1024; }
function openSb(){
  if(isMob()){ sb.classList.add('mob-on'); overlay.classList.add('on'); }
  else { sb.classList.remove('hidden'); main.classList.remove('expanded'); }
}
function closeSb(){
  if(isMob()){ sb.classList.remove('mob-on'); overlay.classList.remove('on'); }
  else { sb.classList.add('hidden'); main.classList.add('expanded'); }
}
function toggleSb(){ sb.classList.contains('hidden') || (isMob() && !sb.classList.contains('mob-on')) ? openSb() : closeSb(); }
$('sb-toggle').addEventListener('click', toggleSb);
$('sb-close').addEventListener('click', closeSb);
overlay.addEventListener('click', closeSb);

// ── CAROUSEL ──────────────────────────────────────────────────────────────────
window.goSlide = function(ci, dir){
  if(slides[ci]===undefined) slides[ci]=0;
  const track = document.querySelector(`#cr-${ci} .c-track`);
  const n = track.children.length;
  slides[ci] = (slides[ci]+dir+n)%n;
  updateCarousel(ci);
};
window.jumpSlide = function(ci, idx){ slides[ci]=idx; updateCarousel(ci); };
function updateCarousel(ci){
  const idx = slides[ci]||0;
  const track = document.querySelector(`#cr-${ci} .c-track`);
  if(track) track.style.transform = `translateX(-${idx*100}%)`;
  document.querySelectorAll(`#cr-${ci} .dot`).forEach((d,i)=>d.classList.toggle('on',i===idx));
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
const lb=$('lb'), lbImg=$('lb-img');
function openLb(src){ lbImg.src=src; lb.classList.add('on'); document.body.style.overflow='hidden'; }
function closeLb(){ lb.classList.remove('on'); document.body.style.overflow=''; }
$('lb-close').addEventListener('click', closeLb);
lb.addEventListener('click', e=>{ if(e.target===lb||e.target===lbImg) closeLb(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLb(); });

// ── RENDER ────────────────────────────────────────────────────────────────────
function getUnique(field){
  return [...new Set(PLANTS.map(p => t(p[field])))].filter(x=>x).sort();
}
function t(obj){ return obj && (obj[lang]||obj.hu||''); }

function renderAll(resetLimit = true){
  if(resetLimit) renderLimit = 10;
  
  const f = $('search').value.toLowerCase();
  const sort = $('sort-sel').value;
  const life = $('fl-life').value;
  const soil = $('fl-soil').value;
  const drought = $('fl-drought').value;
  const sun = $('fl-sun').value;

  let filtered = PLANTS.filter(p => {
    if(f && !(t(p.name).toLowerCase().includes(f) || (p.sci||'').toLowerCase().includes(f))) return false;
    if(life && t(p.lifespan) !== life) return false;
    if(soil && t(p.soil) !== soil) return false;
    if(drought && t(p.drought) !== drought) return false;
    if(sun && t(p.sun) !== sun) return false;
    return true;
  });

  filtered.sort((a,b) => {
    let va = '', vb = '';
    if(sort==='name') { va = t(a.name); vb = t(b.name); }
    else if(sort==='life') { va = t(a.lifespan); vb = t(b.lifespan); }
    else if(sort==='bloom') { va = t(a.bloom); vb = t(b.bloom); }
    else if(sort==='soil') { va = t(a.soil); vb = t(b.soil); }
    else if(sort==='drought') { va = t(a.drought); vb = t(b.drought); }
    else if(sort==='sun') { va = t(a.sun); vb = t(b.sun); }
    else if(sort==='height') { va = t(a.height); vb = t(b.height); }
    return va.localeCompare(vb);
  });

  const grid = $('grid'), nav = $('sb-nav'), cnt = $('sb-count');
  grid.innerHTML=''; nav.innerHTML=''; slides={};

  if(!filtered.length){
    grid.innerHTML=`<div class="no-results"><i class="fa-solid fa-leaf" style="font-size:2rem;margin-bottom:.5rem;opacity:.3"></i><br>${UI[lang].noResults}</div>`;
    cnt.textContent='';
    return;
  }

  cnt.textContent = `${filtered.length} ${UI[lang].plants}`;

  const toRender = filtered.slice(0, renderLimit);

  toRender.forEach((p, ci) => {
    const a = document.createElement('a');
    a.href=`#card-${ci}`; a.innerHTML=`<i class="fa-solid fa-chevron-right"></i>${t(p.name)}`;
    a.addEventListener('click',()=>{ if(isMob()) closeSb(); });
    nav.appendChild(a);

    const imgs = p.images && p.images.length ? p.images : ['images/'+p.short+'_1.jpg','images/'+p.short+'_2.jpg','images/'+p.short+'_3.jpg'];
    const slides3 = imgs.slice(0,3);

    const card = document.createElement('div');
    card.className='card'; card.id=`card-${ci}`;
    card.innerHTML=`
<div class="carousel" id="cr-${ci}">
  <div class="c-track">
    ${slides3.map(img=>`<div class="c-slide"><img src="${img}" alt="${t(p.name)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x230/4a7c59/fff?text=🌿'" onclick="openLb('${img}')"></div>`).join('')}
  </div>
  <button class="c-btn prev" onclick="goSlide(${ci},-1)"><i class="fa-solid fa-chevron-left"></i></button>
  <button class="c-btn next" onclick="goSlide(${ci},1)"><i class="fa-solid fa-chevron-right"></i></button>
  <div class="c-dots">${slides3.map((_,i)=>`<div class="dot${i===0?' on':''}" onclick="jumpSlide(${ci},${i})"></div>`).join('')}</div>
</div>
<div class="c-body">
  <div class="c-names"><h3>${t(p.name)}</h3><span class="sci">${p.sci}</span></div>
  <div class="badges">
    <span class="badge" title="${sort==='life'?'Rendezett':''}"><i class="fa-solid fa-seedling"></i><b>${UI[lang].lifeLabel}:</b> ${t(p.lifespan)}</span>
    <span class="badge" title="${sort==='bloom'?'Rendezett':''}"><i class="fa-solid fa-calendar-days"></i><b>${UI[lang].bloomLabel}:</b> ${t(p.bloom)}</span>
    <span class="badge" title="${sort==='soil'?'Rendezett':''}"><i class="fa-solid fa-mountain"></i><b>${UI[lang].soilLabel}:</b> ${t(p.soil)}</span>
    <span class="badge" title="${sort==='drought'?'Rendezett':''}"><i class="fa-solid fa-droplet"></i><b>${UI[lang].droughtLabel}:</b> ${t(p.drought)}</span>
    <span class="badge" title="${sort==='sun'?'Rendezett':''}"><i class="fa-solid fa-sun"></i><b>${UI[lang].sunLabel}:</b> ${t(p.sun)}</span>
    <span class="badge" title="${sort==='height'?'Rendezett':''}"><i class="fa-solid fa-ruler-vertical"></i><b>${UI[lang].heightLabel}:</b> ${t(p.height)}</span>
  </div>
  <p class="c-desc">${t(p.desc)}</p>
  <a href="${p.link}" target="_blank" class="c-link"><i class="fa-solid fa-circle-info"></i> ${UI[lang].moreInfo}</a>
</div>`;
    grid.appendChild(card);
  });

  if(filtered.length > renderLimit){
    const moreBtn = document.createElement('button');
    moreBtn.className = 'c-link';
    moreBtn.style.gridColumn = '1/-1';
    moreBtn.style.maxWidth = '300px';
    moreBtn.style.margin = '2rem auto';
    moreBtn.innerHTML = '<i class="fa-solid fa-plus"></i> ' + (lang==='hu'?'Több növény betöltése':lang==='de'?'Mehr Pflanzen laden':'Load more plants');
    moreBtn.onclick = () => { renderLimit += 10; renderAll(false); };
    grid.appendChild(moreBtn);
  }

  const cards = document.querySelectorAll('.card');
  const links = document.querySelectorAll('.sb-nav a');
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id, idx=parseInt(id.split('-')[1]);
        links.forEach((l,i)=>l.classList.toggle('active',i===idx));
      }
    });
  },{threshold:.4});
  cards.forEach(c=>io.observe(c));
}


$('search').addEventListener('input', () => renderAll());
$('sort-sel').addEventListener('change', () => renderAll());
$('fl-life').addEventListener('change', () => renderAll());
$('fl-soil').addEventListener('change', () => renderAll());
$('fl-drought').addEventListener('change', () => renderAll());
$('fl-sun').addEventListener('change', () => renderAll());

applyLang(lang);
</script>
</body>
</html>
